services:
  - type: web
    name: codeclarity-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codeclarity-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: codeclarity-cache
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "true"
      - key: USE_CELERY
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant

  - type: keyvalue
    name: codeclarity-cache
    plan: free
    ipAllowList: []

databases:
  - name: codeclarity-db
    databaseName: codeclarity
    plan: free
